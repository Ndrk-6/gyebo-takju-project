<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

#wrap {
  width: 100%;
  height: 100%;
  overflow-y: scroll;
  overflow-x: hidden;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;

}

.slice {
  width: 100%;
  height: 100vh;
  scroll-snap-align: start;
  background-repeat: no-repeat;
}
.slice::-webkit-scrollbar { display: none; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes fadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}
.text-fadein  { animation: fadeIn  1.5s ease forwards; }
.text-fadeout { animation: fadeOut 0.5s ease forwards; }

/* 햄버거 버튼 */
#hamburger {
  position: fixed; top: 48px; left: 19px; z-index: 200;
  display: flex; flex-direction: column; gap: 3.6px;
  cursor: pointer; padding: 4px;
}
#hamburger span {
  display: block; width: 18px; height: 1.5px; background: #ffffff; border-radius: 2px;
}

/* tab 오버레이 */
#tab-overlay {
  position: fixed; inset: 0; z-index: 300;
  pointer-events: none;
}
#tab-overlay.open { pointer-events: auto; }
#tab-bg {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.3);
  opacity: 0; transition: opacity 0.35s ease;
}
#tab-overlay.open #tab-bg { opacity: 1; }
#tab-panel {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  transform: translateX(-100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
#tab-panel img { width: 100%; height: 100%; object-fit: cover; display: block; }
#tab-overlay.open #tab-panel { transform: translateX(0); }
</style>
</head>
<body>

<!-- 햄버거 버튼 -->
<div id="hamburger" onclick="openTab()">
  <span></span><span></span><span></span>
</div>

<!-- tab 오버레이 -->
<div id="tab-overlay">
  <div id="tab-bg" onclick="closeTab()"></div>
  <div id="tab-panel">
    <img src="main/tab_.png" alt="">
    <!-- 메뉴 항목 -->
    <div style="
      position: absolute; top: 21vh; left: 51vw;
      display: flex; flex-direction: column; gap: 3.8vh;
      font-family: 'GowunBatang', Georgia, serif;
      font-size: 18px; color: #014A2E; font-weight: 400;
    ">
      <a href="taste-test-share.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/막걸리 유형테스트.svg" style="height:2.4vh; width:auto; display:block;"></a>
      <a href="map_page.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/막걸리 계보도.svg" style="height:2.4vh; width:auto; display:block;"></a>
      <a href="event/event_page1.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/이벤트.svg" style="height:2.4vh; width:auto; display:block;"></a>
    </div>
    <img src="main/button.svg" onclick="closeTab()" style="
      position: absolute; top: 17vh; left: 50vw;
      width: 3vw; min-width: 20px; height: auto; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    ">
  </div>
</div>

<div id="wrap"></div>
<script>
const SVG_W      = 402;
const SVG_PAGE_H = 874;
const EASE       = 'cubic-bezier(0.4,0,0.2,1)';

const wrap = document.getElementById('wrap');

// ── 공통: 단일 요소 페이드인/아웃 Observer ────────────────────
function observeFade(el, host, threshold = 0.6) {
  new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        setTimeout(() => { el.classList.add('text-fadein'); el.style.opacity = ''; }, 150);
      } else {
        el.classList.remove('text-fadein');
        el.classList.add('text-fadeout');
        setTimeout(() => { el.classList.remove('text-fadeout'); el.style.opacity = '0'; }, 500);
      }
    });
  }, { threshold }).observe(host);
}

// ── 막걸리 병 슬라이드 (수평 전환, 배경 고정) ───────────────
const BOTTLE_PATH = "M259.512 0H6.4878H0C0 54.4976 33.8015 103.935 84.3415 123.787V133H181.594V123.787C232.134 103.935 266 54.4327 266 0H259.512Z";
const maskSvg = `url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 266 133'><path d='${BOTTLE_PATH}' fill='white'/></svg>")`;

const bottleSlice = document.createElement('div');
bottleSlice.className = 'slice';
bottleSlice.style.cssText = "background:url('images/bg_paper.png') center/cover no-repeat;position:relative;overflow:hidden;";

const bItems = []; // { cWrap, bWrap, tImg }
let curB = 0, bBusy = false;

for (let p = 0; p < 5; p++) {
  const cWrap = document.createElement('div');
  cWrap.style.cssText = `position:absolute;inset:0;transform:translateX(${p === 0 ? '0%' : '100%'});`;

  const bWrap = document.createElement('div');
  bWrap.style.cssText = `position:absolute;left:50%;top:50%;transform:translate(-50%,calc(-50% + 71px));width:80%;max-width:266px;opacity:0;`;

  if (p === 0 || p === 4) {
    const img = document.createElement('img');
    img.src = p === 0 ? 'images/bottle.svg' : 'videos/mask.svg';
    img.style.cssText = 'width:100%;height:auto;display:block;';
    bWrap.appendChild(img);
  } else {
    const vWrap = document.createElement('div');
    vWrap.style.cssText = `width:100%;aspect-ratio:266/133;overflow:hidden;-webkit-mask-image:${maskSvg};-webkit-mask-size:100% 100%;mask-image:${maskSvg};mask-size:100% 100%;`;
    const vid = document.createElement('video');
    vid.src = `videos/video${p}.mp4`;
    vid.autoplay = true; vid.loop = true; vid.muted = true;
    vid.setAttribute('playsinline', '');
    vid.style.cssText = `width:100%;height:100%;object-fit:cover;display:block;${p === 1 ? 'transform:scale(1.2);transform-origin:center;' : ''}`;
    vWrap.appendChild(vid);
    bWrap.appendChild(vWrap);
  }

  const tImg = document.createElement('img');
  tImg.src = `main/main_text${p + 1}.svg`;
  tImg.style.cssText = 'position:absolute;bottom:calc(100% + 35px);left:50%;transform:translateX(-50%);width:100%;height:auto;opacity:0;';
  bWrap.appendChild(tImg);
  cWrap.appendChild(bWrap);
  bottleSlice.appendChild(cWrap);
  bItems.push({ cWrap, bWrap, tImg });
}

// 섹션 진입/이탈 페이드 (scroll 기반)
let bFadedIn = false, bFadeTimer = null;

function setBottleFade(fadeIn) {
  if (bFadedIn === fadeIn) return;
  bFadedIn = fadeIn;
  clearTimeout(bFadeTimer);
  const { bWrap, tImg } = bItems[curB];
  if (fadeIn) {
    [bWrap, tImg].forEach(el => {
      el.style.transition = 'none';
      el.style.opacity = '0';
      void el.offsetWidth;
      el.style.transition = 'opacity 2s ease';
      el.style.opacity = '1';
    });
  } else {
    [bWrap, tImg].forEach(el => {
      el.style.transition = 'opacity 2s ease';
      el.style.opacity = '0';
    });
  }
}

// 수평 전환
function switchB(dir) {
  const next = curB + dir;
  if (next < 0 || next >= 5 || bBusy) return false;
  bBusy = true;
  const from = bItems[curB], to = bItems[next];

  // 들어오는 잔 페이드인 + 나가는 잔 페이드아웃
  [from.bWrap, from.tImg].forEach(el => {
    el.style.transition = 'opacity 2s ease';
    el.style.opacity = '0';
  });
  [to.bWrap, to.tImg].forEach(el => {
    el.style.transition = 'none';
    el.style.opacity = '0';
  });

  to.cWrap.style.transition = 'none';
  to.cWrap.style.transform = dir > 0 ? 'translateX(100%)' : 'translateX(-100%)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const t = 'transform 0.45s ease';
    from.cWrap.style.transition = t; to.cWrap.style.transition = t;
    from.cWrap.style.transform = dir > 0 ? 'translateX(-100%)' : 'translateX(100%)';
    to.cWrap.style.transform = 'translateX(0%)';
    // 들어오는 잔 페이드인 시작
    [to.bWrap, to.tImg].forEach(el => {
      el.style.transition = 'opacity 2s ease';
      el.style.opacity = '1';
    });
    curB = next;
    setTimeout(() => { bBusy = false; }, 450);
  }));
  return true;
}

function isBottleActive() {
  const r = bottleSlice.getBoundingClientRect();
  return r.top <= 5 && r.bottom >= window.innerHeight - 5;
}

// 스크롤로 섹션 진입/이탈 감지
wrap.addEventListener('scroll', () => {
  setBottleFade(isBottleActive());
}, { passive: true });

// 휠
wrap.addEventListener('wheel', (e) => {
  if (!isBottleActive()) return;
  const dir = e.deltaY > 0 ? 1 : -1;
  if ((dir === 1 && curB < 4) || (dir === -1 && curB > 0)) {
    e.preventDefault(); switchB(dir);
  }
}, { passive: false });

// 터치
let bTY = 0;
bottleSlice.addEventListener('touchstart', e => { bTY = e.touches[0].clientY; }, { passive: true });
bottleSlice.addEventListener('touchmove', e => {
  const dy = bTY - e.touches[0].clientY;
  const dir = dy > 0 ? 1 : -1;
  if (Math.abs(dy) > 15 && ((dir === 1 && curB < 4) || (dir === -1 && curB > 0))) e.preventDefault();
}, { passive: false });
bottleSlice.addEventListener('touchend', e => {
  const dy = bTY - e.changedTouches[0].clientY;
  if (Math.abs(dy) < 30) return;
  switchB(dy > 0 ? 1 : -1);
}, { passive: true });

const bottleSlices = [bottleSlice];

// ── 정적 슬라이스 데이터 ──────────────────────────────────────
const STATIC_PAGES = [
  { bg: "url('main/main_first_page.svg')",      text: 'main/main_first_text.svg',  textCss: 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60%;height:auto;opacity:0;', logo: 'images/logo_white.svg' },
  null, // i=1: hWrap
  { bg: "url('main/main_third%20page.svg')",     text: 'main/main_third_text.svg',  textCss: 'position:absolute;top:20px;right:20px;width:40%;height:auto;opacity:0;' },
  { bg: "url('main/main_fourth_page.png')",      text: 'main/main_fourth_text.svg', textCss: 'position:absolute;left:20px;top:50%;transform:translateY(-50%);width:40%;height:auto;opacity:0;' },
  { bg: "url('main/main_fifth_page.svg')",       text: 'main/main_fifth_text.svg',  textCss: 'position:absolute;bottom:20px;right:20px;width:40%;height:auto;opacity:0;' },
];

for (let i = 0; i < 5; i++) {
  if (i === 1) { bottleSlices.forEach(s => wrap.appendChild(s)); continue; }
  const cfg = STATIC_PAGES[i];
  const div = document.createElement('div');
  div.className = 'slice';
  div.style.backgroundImage = cfg.bg;
  div.style.backgroundSize     = 'cover';
  div.style.backgroundPosition = (i === 2) ? 'center top' : 'center';
  div.style.position        = 'relative';
  const textEl = document.createElement('img');
  textEl.src = cfg.text;
  textEl.style.cssText = cfg.textCss;
  div.appendChild(textEl);
  if (cfg.logo) { const logoEl = document.createElement('img'); logoEl.src = cfg.logo; logoEl.style.cssText = 'position:absolute;top:46px;left:50%;transform:translateX(-50%);width:48px;height:auto;'; div.appendChild(logoEl); }
  observeFade(textEl, div);
  wrap.appendChild(div);
}

// ── 6번째: bg_paper + 6page_1, 6page_2 순차 페이드인 ─────────
const p2 = document.createElement('div');
p2.className = 'slice';
p2.style.cssText = "background:url('images/bg_paper.png') center/cover no-repeat;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;";

const img6p1 = document.createElement('img');
img6p1.src = 'images/6page_1.svg';
img6p1.style.cssText = 'width:48%;max-width:192px;height:auto;opacity:0;';
p2.appendChild(img6p1);

const img6p2 = document.createElement('img');
img6p2.src = 'images/6page_2.svg';
img6p2.style.cssText = 'width:64%;max-width:256px;height:auto;opacity:0;';
p2.appendChild(img6p2);

new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      setTimeout(() => {
        img6p1.classList.add('text-fadein'); img6p1.style.opacity = '';
        setTimeout(() => { img6p2.classList.add('text-fadein'); img6p2.style.opacity = ''; }, 800);
      }, 150);
    } else {
      [img6p1, img6p2].forEach(el => {
        el.classList.remove('text-fadein');
        el.classList.add('text-fadeout');
        setTimeout(() => { el.classList.remove('text-fadeout'); el.style.opacity = '0'; }, 500);
      });
    }
  });
}, { threshold: 0.6 }).observe(p2);
wrap.appendChild(p2);

// ── 7번째: bg_paper + 7page_text 중앙 ───────────────────────
const p3 = document.createElement('div');
p3.className = 'slice';
p3.style.cssText = "background:url('images/bg_paper.png') center/cover no-repeat;position:relative;";
const img7text = document.createElement('img');
img7text.src = 'images/7page_text.svg';
img7text.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48%;max-width:192px;height:auto;opacity:0;';
p3.appendChild(img7text);
observeFade(img7text, p3);
wrap.appendChild(p3);

// ── 8번째: 로고 + 정보 슬라이드업 ───────────────────────────
const pb = document.createElement('div');
pb.className = 'slice';
pb.style.cssText = "position:relative;overflow:hidden;background:url('images/bg_paper.png') 100% 100%/100% 100% no-repeat;font-family:'GowunBatang',Georgia,serif;";

pb.innerHTML = `
  <img id="pb-logo" src="images/logo_first.svg" style="
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:160px;height:auto;opacity:0;
    transition:top 0.7s ${EASE},transform 0.7s ${EASE},opacity 0.8s ease;
  ">
  <div id="pb-info" style="
    position:absolute;inset:0;
    font-family:'GowunBatang',Georgia,serif;
    font-size:20px;font-weight:400;color:#014A2E;
    transform:translateY(100%);
    transition:transform 0.7s ${EASE};
  ">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:2;">
      <div>16:00 - 24:00</div>
      <div>마지막 주문 23:30</div>
    </div>
    <div style="position:absolute;bottom:48px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="display:flex;gap:16px;align-items:center;">
        <a href="https://www.instagram.com/gyebo_takju/" target="_blank"><img src="images/insta.svg" style="width:36px;height:36px;"></a>
        <a href="https://naver.me/GvW00Z9b" target="_blank"><img src="images/naver.svg" style="width:36px;height:36px;"></a>
        <a href="tel:07042590005"><img src="images/call.svg" style="width:36px;height:36px;"></a>
      </div>
      <div style="font-size:20px;">경기 수원시 팔달구 정조로 781-13</div>
      <button onclick="document.getElementById('wrap').scrollTo({top:0,behavior:'smooth'})"
        style="border:1.5px solid #014A2E;background:transparent;color:#014A2E;font-family:'GowunBatang',Georgia,serif;font-size:20px;font-weight:400;padding:12px 48px;border-radius:3px;cursor:pointer;letter-spacing:.04em;">
        맨 위로
      </button>
    </div>
  </div>
`;
wrap.appendChild(pb);


// pb 요소 캐싱 (스크롤 핫패스에서 getElementById 반복 방지)
const pbLogo = document.getElementById('pb-logo');
const pbInfo = document.getElementById('pb-info');

let infoShown = false;
let touchStartY = 0;

const LOGO_TRANSITION = `top 0.7s ${EASE},transform 0.7s ${EASE},opacity 0.8s ease`;
const INFO_TRANSITION  = `transform 0.7s ${EASE}`;

function showInfo() {
  if (infoShown) return;
  infoShown = true;
  pbLogo.style.top = '14vh';
  pbLogo.style.transform = 'translate(-50%, 0)';
  pbInfo.style.transform = 'translateY(0)';
}

function resetInfo() {
  infoShown = false;
  pbLogo.style.transition = 'none';
  pbLogo.style.top = '50%';
  pbLogo.style.transform = 'translate(-50%, -50%)';
  pbLogo.style.opacity = '0';
  pbInfo.style.transition = 'none';
  pbInfo.style.transform = 'translateY(100%)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    pbLogo.style.transition = LOGO_TRANSITION;
    pbInfo.style.transition = INFO_TRANSITION;
  }));
}

new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      setTimeout(() => { pbLogo.style.opacity = '1'; }, 150);
    } else {
      resetInfo();
    }
  });
}, { threshold: 0.1 }).observe(pb);

function isAtLastPage() {
  return wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 10;
}

wrap.addEventListener('wheel', (e) => {
  if (isAtLastPage() && e.deltaY > 0 && !infoShown) { e.preventDefault(); showInfo(); }
}, { passive: false });

wrap.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

wrap.addEventListener('touchmove', (e) => {
  // 병 섹션: 마지막/첫 잔 아니면 수직 스크롤 차단
  if (isBottleActive()) {
    const dy = touchStartY - e.touches[0].clientY;
    const dir = dy > 0 ? 1 : -1;
    if ((dir === 1 && curB < 4) || (dir === -1 && curB > 0)) {
      e.preventDefault(); return;
    }
  }
  if (isAtLastPage() && (touchStartY - e.touches[0].clientY) > 30 && !infoShown) {
    e.preventDefault(); showInfo();
  }
}, { passive: false });

function openTab()  { document.getElementById('tab-overlay').classList.add('open');    }
function closeTab() { document.getElementById('tab-overlay').classList.remove('open'); }
</script>
</body>
</html>
