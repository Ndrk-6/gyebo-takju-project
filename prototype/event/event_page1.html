<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

#container {
  position: relative;
  width: 100%; height: 100%;
  overflow: hidden;
}

.panel {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.panel img.bg { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }

/* 햄버거 */
#hamburger {
  position: fixed;
  top: calc(5.86vh - 4px);
  left: calc(6.63vw - 4px);
  z-index: 200;
  width: 26px; height: 18px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* 탭 오버레이 */
#tab-overlay { position: fixed; inset: 0; z-index: 300; pointer-events: none; }
#tab-overlay.open { pointer-events: auto; }
#tab-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.35s ease; }
#tab-overlay.open #tab-bg { opacity: 1; }
#tab-panel {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  transform: translateX(-100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
#tab-panel img.tab-bg { width: 100%; height: 100%; object-fit: cover; display: block; }
#tab-overlay.open #tab-panel { transform: translateX(0); }

/* 페이드 */
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes fadeOut { from{opacity:1} to{opacity:0} }
.fadein  { animation: fadeIn  0.8s ease forwards; }
.fadeout { animation: fadeOut 0.5s ease forwards; }

.txt { position: absolute; height: auto; opacity: 0; pointer-events: none; z-index: 100; }
.txt1 { top: 140px; right: 40px; }
.txt2 { bottom: 20px; left: 20px; }

#t1p1 { width: 54vw; top: 140px; }
#t1p2 { width: 60vw; top: 140px; left: 20px; right: auto; }
#t1p3 { width: 74vw; top: 140px; right: 40px; left: auto; }
#t1p4 { width: 41vw; top: 140px; left: 20px; right: auto; }

#t2p1 { width: 82vw; }
#t2p2 { width: 67vw; right: 20px; left: auto; }
#t2p3 { width: 73vw; }
#t2p4 { width: 60vw; right: 20px; left: auto; }

/* 로고 버튼 */
.logo-btn {
  position: absolute;
  left: calc(181 / 402 * 100%);
  top: calc(39.7 / 874 * 100%);
  width: calc(45 / 402 * 100%);
  height: calc(35 / 874 * 100%);
  z-index: 150; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* > 버튼 */
.next-btn {
  position: absolute;
  right: 3vw; top: 4.5vh;
  width: 12vw; height: 5vh;
  z-index: 150; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>

<div id="container">

  <!-- 1페이지 -->
  <div class="panel" id="ep1">
    <img class="bg" src="event_page1.svg" alt="">
    <img class="txt txt1" id="t1p1" src="event_1_text1.svg" alt="">
    <img class="txt txt2" id="t2p1" src="event_1_text2.svg" alt="">
    <div class="next-btn" onclick="switchPanel(1)"></div>
    <a class="logo-btn" href="../main_page.html"></a>
  </div>

  <!-- 2페이지 -->
  <div class="panel" id="ep2">
    <img class="bg" src="event_2_page.svg" alt="">
    <img class="txt txt1" id="t1p2" src="event_2_text1.svg" alt="">
    <img class="txt txt2" id="t2p2" src="event_2_text2.svg" alt="">
    <div class="next-btn" onclick="switchPanel(1)"></div>
    <a class="logo-btn" href="../main_page.html"></a>
  </div>

  <!-- 3페이지 -->
  <div class="panel" id="ep3">
    <img class="bg" src="event_3_page.svg" alt="">
    <img class="txt txt1" id="t1p3" src="event_3_text1.svg" alt="">
    <img class="txt txt2" id="t2p3" src="event_3_text2.svg" alt="">
    <div class="next-btn" onclick="switchPanel(1)"></div>
    <a class="logo-btn" href="../main_page.html"></a>
  </div>

  <!-- 4페이지 -->
  <div class="panel" id="ep4">
    <img class="bg" src="event_4_page.svg" alt="">
    <img class="txt txt1" id="t1p4" src="event_4_text1.svg" alt="">
    <img class="txt txt2" id="t2p4" src="event_4_text2.svg" alt="">
    <div class="next-btn" onclick="switchPanel(-cur)"></div>
    <a class="logo-btn" href="../main_page.html"></a>
  </div>

</div>

<!-- 햄버거 -->
<div id="hamburger" onclick="openTab()"></div>

<!-- 탭 오버레이 -->
<div id="tab-overlay">
  <div id="tab-bg" onclick="closeTab()"></div>
  <div id="tab-panel">
    <img class="tab-bg" src="../main/tab_.png" alt="">
    <div style="position:absolute;top:180px;left:200px;display:flex;flex-direction:column;gap:32px;">
      <a href="../taste-test-share.html" style="-webkit-tap-highlight-color:transparent;"><img src="../main/막걸리 유형테스트.svg" style="height:20px;width:auto;display:block;"></a>
      <a href="../map_page.html" style="-webkit-tap-highlight-color:transparent;"><img src="../main/막걸리 계보도.svg" style="height:20px;width:auto;display:block;"></a>
      <a href="event_page1.html" style="-webkit-tap-highlight-color:transparent;"><img src="../main/이벤트.svg" style="height:20px;width:auto;display:block;"></a>
    </div>
    <img src="../main/button.svg" onclick="closeTab()" style="position:absolute;top:140px;left:195px;width:24px;height:auto;cursor:pointer;-webkit-tap-highlight-color:transparent;">
  </div>
</div>

<script>
const EASE = 'cubic-bezier(0.4,0,0.2,1)';

const panels = [
  { el: document.getElementById('ep1'), t1: document.getElementById('t1p1'), t2: document.getElementById('t2p1') },
  { el: document.getElementById('ep2'), t1: document.getElementById('t1p2'), t2: document.getElementById('t2p2') },
  { el: document.getElementById('ep3'), t1: document.getElementById('t1p3'), t2: document.getElementById('t2p3') },
  { el: document.getElementById('ep4'), t1: document.getElementById('t1p4'), t2: document.getElementById('t2p4') },
];

let cur = 0, busy = false;

panels.forEach((p, i) => {
  p.el.style.transform = i === 0 ? 'translateX(0%)' : 'translateX(100%)';
});

function fadeIn(t1, t2) {
  setTimeout(() => { t1.classList.add('fadein'); t1.style.opacity = ''; }, 300);
  setTimeout(() => { t2.classList.add('fadein'); t2.style.opacity = ''; }, 1000);
}
function fadeOut(t1, t2) {
  [t1, t2].forEach(el => {
    el.classList.remove('fadein');
    el.classList.add('fadeout');
    setTimeout(() => { el.classList.remove('fadeout'); el.style.opacity = '0'; }, 500);
  });
}

fadeIn(panels[0].t1, panels[0].t2);

function switchPanel(dir) {
  const next = cur + dir;
  if (next < 0 || next >= panels.length || busy) return false;
  busy = true;

  const from = panels[cur], to = panels[next];
  fadeOut(from.t1, from.t2);

  to.el.style.transition = 'none';
  to.el.style.transform = dir > 0 ? 'translateX(100%)' : 'translateX(-100%)';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    const t = `transform 0.45s ${EASE}`;
    from.el.style.transition = t;
    to.el.style.transition = t;
    from.el.style.transform = dir > 0 ? 'translateX(-100%)' : 'translateX(100%)';
    to.el.style.transform = 'translateX(0%)';
    fadeIn(to.t1, to.t2);
    cur = next;
    setTimeout(() => { busy = false; }, 450);
  }));
  return true;
}

// 휠
document.addEventListener('wheel', (e) => {
  const dir = e.deltaY > 0 ? 1 : -1;
  if ((dir === 1 && cur < panels.length - 1) || (dir === -1 && cur > 0)) {
    e.preventDefault();
    switchPanel(dir);
  }
}, { passive: false });

// 터치
let tY = 0;
document.addEventListener('touchstart', e => { tY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dy = tY - e.changedTouches[0].clientY;
  if (Math.abs(dy) < 30) return;
  const dir = dy > 0 ? 1 : -1;
  if ((dir === 1 && cur < panels.length - 1) || (dir === -1 && cur > 0)) {
    switchPanel(dir);
  }
}, { passive: true });

function openTab()  { document.getElementById('tab-overlay').classList.add('open');    }
function closeTab() { document.getElementById('tab-overlay').classList.remove('open'); }
</script>
</body>
</html>
