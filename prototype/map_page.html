<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

/* 세로 스크롤 */
#v-scroll {
  width: 100%; height: 100%;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#v-scroll::-webkit-scrollbar { display: none; }

.v-section {
  width: 100%; height: 100vh;
  position: relative;
}

/* ── 섹션1: 막걸리 상세 ── */
#detail-section {
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  background: url('images/bg_paper.png') center / cover;
}
#detail-section::-webkit-scrollbar { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
#detail-section img { animation: fadeIn 0.5s ease forwards; }

/* ── 섹션2: 지도 ── */
#map-section {
  overflow: hidden;
  background: url('images/bg_paper.png') center / cover;
}

@keyframes mapFadeIn { from { opacity: 0; } to { opacity: 1; } }

#map-spine { animation: mapFadeIn 0.6s ease 0s forwards; opacity: 0; }
#map-topbar { animation: mapFadeIn 0.6s ease 0.3s forwards; opacity: 0; }
#txt1     { animation: mapFadeIn 0.6s ease 0.3s forwards; opacity: 0; }
#txt2     { animation: mapFadeIn 0.6s ease 0.6s forwards; opacity: 0; }
#txt3     { animation: mapFadeIn 0.6s ease 1.3s forwards; opacity: 0; }
#map-wrap img.map-img { animation: mapFadeIn 0.6s ease 0.6s forwards; opacity: 0; }
.region-btn, .region-wrap, .region-hit { animation: mapFadeIn 0.6s ease 1.3s forwards; opacity: 0; }

.txt-overlay {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  height: auto; pointer-events: none;
}
#txt1 { top: 12%;   width: 37%; }
#txt2 { top: 16.1%; width: 57%; }
#txt3 { bottom: 3%;  width: 42%; }

#map-wrap {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  top: 24%; width: 83%;
}
#map-wrap img.map-img { width: 100%; height: auto; display: block; }

/* 시각적 버튼 크기 */
.region-btn {
  position: absolute;
  width: 18.2%; height: auto;
  transform: translate(-50%, -50%);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s ease;
  z-index: 1;
}
.region-btn:active { transform: translate(-50%, -50%) scale(0.92); }

/* 터치 영역 10%, 시각 영역 18.2% (182% of wrapper) */
.region-hit {
  position: absolute;
  width: 10%;
  transform: translate(-50%, -50%);
  overflow: visible;
  z-index: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.region-hit > img {
  display: block;
  width: 182%; height: auto;
  margin-left: -41%;
  pointer-events: none;
  transition: transform 0.15s ease;
}
.region-hit:active > img { transform: scale(0.92); }

.region-wrap {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 18.2%; z-index: 1;
  pointer-events: none;
}
.region-wrap > .region-btn {
  position: relative; width: 100%; height: auto;
  transform: none; left: auto; top: auto; display: block;
  pointer-events: none;
}
.region-wrap > .region-btn:active { transform: scale(0.92); }

.event-popup {
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%);
  width: 345%; height: auto;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  z-index: 10;
}
.event-popup.show { opacity: 1; pointer-events: auto; cursor: pointer; }

/* 햄버거 */
#hamburger {
  position: fixed;
  left: 4.98vw; top: 5.38vh;
  z-index: 200; width: 5.47vw; height: 1.83vh;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}

/* 탭 오버레이 */
#tab-overlay { position: fixed; inset: 0; z-index: 300; pointer-events: none; }
#tab-overlay.open { pointer-events: auto; }
#tab-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.35s ease; }
#tab-overlay.open #tab-bg { opacity: 1; }
#tab-panel {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  transform: translateX(-100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
}
#tab-panel img.tab-bg { width: 100%; height: 100%; object-fit: cover; display: block; }
#tab-overlay.open #tab-panel { transform: translateX(0); }
</style>
</head>
<body>

<div id="v-scroll">

  <!-- 섹션1: 막걸리 상세 -->
  <div class="v-section" id="detail-section">
    <!-- goDetail()로 채워짐 -->
  </div>

  <!-- 섹션2: 지도 -->
  <div class="v-section" id="map-section">
    <img id="map-spine" src="map/spine_map.svg" style="position:absolute; top:0; left:0; width:100%; height:auto; display:block;">
    <img class="txt-overlay" id="txt1" src="map/map_1_text1.svg" alt="">
    <img class="txt-overlay" id="txt2" src="map/map_1_text2.svg" alt="">
    <img class="txt-overlay" id="txt3" src="map/map_1_text3.svg" alt="">
    <div id="map-topbar" style="position:absolute; top:0; left:0; width:100%; display:flex; align-items:center; justify-content:space-between; padding:30px 16px 12px; box-sizing:border-box;">
      <img src="map/hamb.svg" style="height:auto;" alt="">
      <img src="images/logo_first.svg" style="width:13%; height:auto; transform:translateX(-8px);" alt="">
      <img src="map/icon_map.svg" style="height:auto;" alt="">
    </div>

    <div id="map-wrap">
      <img class="map-img" src="map/map_images.png" alt="">

      <div class="region-hit" style="left:61%; top:50.7%;" onclick="goRegion('단양')"><img src="map/단양.png" alt="단양"></div>
      <div class="region-hit" style="left:68%; top:53.4%;" onclick="goRegion('지평')"><img src="map/지평.png" alt="지평"></div>
      <div class="region-hit" style="left:66%; top:64%;" onclick="goRegion('청송')"><img src="map/청송.png" alt="청송"></div>
      <div class="region-wrap" style="left:59%; top:62.3%;">
        <div class="event-popup" id="popup-문경">
          <img src="map/문경이벤트.svg" style="width:100%; display:block;">
          <div onclick="goDetail('오미자')" style="position:absolute; top:0; left:0; width:100%; height:50%; cursor:pointer; -webkit-tap-highlight-color:transparent;"></div>
          <div onclick="goDetail('구름')" style="position:absolute; top:50%; left:0; width:100%; height:50%; cursor:pointer; -webkit-tap-highlight-color:transparent;"></div>
        </div>
        <img class="region-btn" src="map/문경.png" alt="문경">
        <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:55%;height:100%;cursor:pointer;z-index:2;pointer-events:auto;-webkit-tap-highlight-color:transparent;" onclick="goRegion('문경')"></div>
      </div>
      <div class="region-hit" style="left:40.4%; top:66%;" onclick="goRegion('공주')"><img src="map/공주.png" alt="공주"></div>
      <div class="region-wrap" style="left:35%; top:81%;">
        <div class="event-popup" id="popup-해남">
          <img src="map/해남이벤트.svg" style="width:100%; display:block;">
          <div onclick="goDetail('해창')" style="position:absolute; top:0; left:0; width:100%; height:50%; cursor:pointer; -webkit-tap-highlight-color:transparent;"></div>
          <div onclick="goDetail('해남')" style="position:absolute; top:50%; left:0; width:100%; height:50%; cursor:pointer; -webkit-tap-highlight-color:transparent;"></div>
        </div>
        <img class="region-btn" src="map/해남.png" alt="해남">
        <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:55%;height:100%;cursor:pointer;z-index:2;pointer-events:auto;-webkit-tap-highlight-color:transparent;" onclick="goRegion('해남')"></div>
      </div>
      <div class="region-hit" style="left:43%; top:81%;" onclick="goRegion('고흥')"><img src="map/고흥.png" alt="고흥"></div>
    </div>
  </div>

</div>


<!-- 로고 → 메인 이동 -->
<a href="main_page.html" style="position:fixed; top:10px; left:50%; transform:translateX(-50%); width:100px; height:44px; z-index:200; -webkit-tap-highlight-color:transparent;"></a>

<!-- 햄버거 -->
<div id="hamburger" onclick="openTab()"></div>

<!-- 탭 오버레이 -->
<div id="tab-overlay">
  <div id="tab-bg" onclick="closeTab()"></div>
  <div id="tab-panel">
    <img class="tab-bg" src="main/tab_.png" alt="">
    <div style="position:absolute;top:21vh;left:51vw;display:flex;flex-direction:column;gap:3.8vh;">
      <a href="taste-test-share.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/막걸리 유형테스트.svg" style="height:2.4vh;width:auto;display:block;"></a>
      <a href="map_page.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/막걸리 계보도.svg" style="height:2.4vh;width:auto;display:block;"></a>
      <a href="event/event_page1.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/이벤트.svg" style="height:2.4vh;width:auto;display:block;"></a>
    </div>
    <img src="main/button.svg" onclick="closeTab()" style="position:absolute;top:17vh;left:50vw;width:3vw;min-width:20px;height:auto;cursor:pointer;-webkit-tap-highlight-color:transparent;">
  </div>
</div>

<script>
const regionData = {
  '청송': { img: 'images/mkgl_sagubae.png', t: '청송',  r: [5,2,2,5] },
  '단양': { img: 'images/mkgl_kongmak.png', t: '소백산', r: [3,4,4,4] },
  '지평': { img: 'images/mkgl_jipyeong.png', t: '지평',  r: [3,3,5,5] },
  '공주': { img: 'images/mkgl_wangbam.png', t: '공주',  r: [4,4,3,4] },
  '고흥': { img: 'images/mkgl_yuja.png', t: '고흥',   r: [5,2,2,5] },
  '오미자': { img: 'images/mkgl_omija.png', t: '오미자', r: [5,2,2,5] },
  '구름': { img: 'images/mkgl_gureum.png', t: '구름',  r: [4,4,5,3] },
  '해창': { img: 'images/mkgl_haechang.png', t: '해창',  r: [4,5,5,3] },
  '해남': { img: 'images/mkgl_haenam.png', t: '해남',  r: [4,4,4,4] },
};

const vScroll       = document.getElementById('v-scroll');
const detailSection = document.getElementById('detail-section');
const mapSection    = document.getElementById('map-section');

function fitMapSection() {
  const mapWrap = document.getElementById('map-wrap');
  if (!mapWrap) return;
  const needed = mapWrap.offsetTop + mapWrap.offsetHeight + 60;
  mapSection.style.height = Math.max(window.innerHeight, needed) + 'px';
}

// 지도 이미지 로드 후 섹션 높이 조정
const mapImg = document.querySelector('#map-wrap .map-img');
if (mapImg) {
  if (mapImg.complete) fitMapSection();
  else mapImg.addEventListener('load', fitMapSection);
}
window.addEventListener('resize', fitMapSection);

// 진입 시 지도(섹션2)를 즉시 표시
vScroll.scrollTop = mapSection.offsetTop;
window.addEventListener('load', () => {
  fitMapSection();
  vScroll.scrollTop = mapSection.offsetTop;
});

let detailReady = false;

// 위로 스크롤 차단 (detail 비어있을 때)
vScroll.addEventListener('wheel', (e) => {
  if (!detailReady && e.deltaY < 0) e.preventDefault();
}, { passive: false });

let touchStartY = 0;
vScroll.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
vScroll.addEventListener('touchmove', (e) => {
  if (!detailReady && e.touches[0].clientY > touchStartY) e.preventDefault();
}, { passive: false });

function makeRatingGrid(ratings) {
  return ratings.map((filled, rowIdx) => {
    const cups = Array.from({length: 5}, (_, i) => {
      const isFull = i < filled;
      const delay = (rowIdx * 5 + i) * 80 + 1300;
      return `<img src="map/${isFull ? '풀잔' : '빈잔'}.svg" style="width:8.5vw; height:auto; opacity:0; animation:mapFadeIn 0.4s ease ${delay}ms forwards;" alt="">`;
    }).join('');
    return `<div style="display:flex; gap:1.1vw;">${cups}</div>`;
  }).join('');
}

function goDetail(key) {
  detailReady = true;
  const spine = document.getElementById('map-spine');
  const topbar = document.getElementById('map-topbar');
  [spine, topbar].forEach(el => { if (el) { el.style.animation = 'none'; el.style.opacity = '0'; } });
  const data = regionData[key];
  const imgSrc = data ? data.img : '';
  const t = data ? data.t : '';
  const ratings = data ? data.r : [0,0,0,0];
  detailSection.innerHTML = `
    <div style="height:100vh; display:flex; flex-direction:column; overflow:hidden;">
      <img src="map/spine_map.svg" style="width:100%; height:auto; display:block;" alt="">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:30px 16px 12px;">
        <img src="map/hamb.svg" style="height:auto; cursor:pointer; -webkit-tap-highlight-color:transparent;" onclick="openTab()" alt="">
        <a href="main_page.html" style="display:contents;"><img src="images/logo_first.svg" style="width:13%; height:auto; transform:translateX(-8px);" alt=""></a>
        <img src="map/icon_map.svg" style="height:auto; cursor:pointer; -webkit-tap-highlight-color:transparent;" onclick="vScroll.scrollTo({top: mapSection.offsetTop, behavior:'smooth'})" alt="">
      </div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:16px; gap:8px;">
        ${t ? `<img src="map/${t}_t1.svg" style="width:58%; height:auto; opacity:0; animation:mapFadeIn 0.5s ease 100ms forwards;" alt="">` : ''}
        ${imgSrc ? `<img src="${imgSrc}" style="width:17%; height:auto; opacity:0; animation:mapFadeIn 0.5s ease 500ms forwards;" alt="">` : ''}
        ${t ? `<img src="map/${t}_t2.svg" style="width:62%; height:auto; opacity:0; animation:mapFadeIn 0.5s ease 900ms forwards;" alt="">` : ''}
        <div style="position:absolute; bottom:16vh; left:15%; display:flex; align-items:flex-start; gap:1.3vw;">
          <img src="map/평가.svg" style="width:12.5vw; height:auto; opacity:0; animation:mapFadeIn 0.5s ease 1200ms forwards;" alt="">
          <div style="display:flex; flex-direction:column; justify-content:space-between; height:36vw; padding:1.3vw 0 1.6vw; box-sizing:border-box;">
            ${makeRatingGrid(ratings)}
          </div>
        </div>
      </div>
    </div>
  `;
  detailSection.scrollTop = 0;
  vScroll.scrollTo({ top: 0, behavior: 'smooth' });
}

function goRegion(name) {
  const popup = document.getElementById('popup-' + name);
  if (popup) {
    const isShown = popup.classList.contains('show');
    document.querySelectorAll('.event-popup').forEach(p => p.classList.remove('show'));
    if (!isShown) popup.classList.add('show');
  } else if (regionData[name]) {
    goDetail(name);
  }
}

function openTab()  { document.getElementById('tab-overlay').classList.add('open'); }
function closeTab() { document.getElementById('tab-overlay').classList.remove('open'); }

// ── 버튼 위치 조정 모드 (개발용) ─────────────────────────────
// URL에 ?edit 붙이면 활성화: map_page.html?edit
if (location.search.includes('edit')) {
  window.addEventListener('load', () => {
    const wrap = document.getElementById('map-wrap');
    document.querySelectorAll('.region-btn, .region-wrap, .region-hit').forEach(el => {
      el.style.cursor = 'grab';
      let startX, startY, origLeft, origTop;
      el.addEventListener('pointerdown', e => {
        e.stopPropagation();
        el.setPointerCapture(e.pointerId);
        el.style.cursor = 'grabbing';
        startX = e.clientX; startY = e.clientY;
        origLeft = parseFloat(el.style.left) || 0;
        origTop  = parseFloat(el.style.top)  || 0;
      });
      el.addEventListener('pointermove', e => {
        if (e.buttons !== 1) return;
        const dx = (e.clientX - startX) / wrap.offsetWidth  * 100;
        const dy = (e.clientY - startY) / wrap.offsetHeight * 100;
        el.style.left = (origLeft + dx) + '%';
        el.style.top  = (origTop  + dy) + '%';
      });
      el.addEventListener('pointerup', e => {
        el.style.cursor = 'grab';
        console.log(`${el.alt || el.className}: left:${parseFloat(el.style.left).toFixed(1)}%; top:${parseFloat(el.style.top).toFixed(1)}%`);
      });
    });
    console.log('🗺 버튼 위치 편집 모드 ON — 드래그 후 콘솔에서 좌표 확인');
  });
}

// 햄버거: 지도 섹션이 보일 때만 표시
function updateHamburger() {
  const show = vScroll.scrollTop > window.innerHeight * 0.5;
  const ham = document.getElementById('hamburger');
  ham.style.opacity = show ? '1' : '0';
  ham.style.pointerEvents = show ? 'auto' : 'none';
}
vScroll.addEventListener('scroll', updateHamburger, { passive: true });
updateHamburger();

// 지도 섹션 진입 시 애니메이션 재초기화
function resetMapAnims() {
  const headerTargets = detailReady ? [] : [
    document.getElementById('map-spine'),
    document.getElementById('map-topbar'),
  ];
  const targets = [
    ...headerTargets,
    document.getElementById('txt1'),
    document.getElementById('txt2'),
    document.getElementById('txt3'),
    document.querySelector('#map-wrap .map-img'),
    ...document.querySelectorAll('.region-btn, .region-wrap, .region-hit'),
  ].filter(Boolean);

  targets.forEach(el => { el.style.animation = 'none'; el.style.opacity = '0'; });
  void document.getElementById('map-section').offsetWidth;
  targets.forEach(el => { el.style.animation = ''; el.style.opacity = ''; });
  if (detailReady) {
    [document.getElementById('map-spine'), document.getElementById('map-topbar')]
      .forEach(el => { if (el) { el.style.animation = 'none'; el.style.opacity = '0'; } });
  }
  document.querySelectorAll('.event-popup').forEach(p => p.classList.remove('show'));
}

let mapInitialized = false;
const mapObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      if (!mapInitialized) { mapInitialized = true; return; }
      if (!detailReady) resetMapAnims();
    }
  });
}, { threshold: 0.6, root: vScroll });
mapObserver.observe(document.getElementById('map-section'));
</script>
</body>
</html>
