<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="map_page.css">
</head>
<body>

<div id="v-scroll">

  <!-- 섹션1: 막걸리 상세 -->
  <div class="v-section" id="detail-section">
    <!-- goDetail()로 채워짐 -->
  </div>

  <!-- 섹션2: 지도 -->
  <div class="v-section" id="map-section">
    <img id="map-spine" src="map/spine_map.svg" style="position:absolute; top:0; left:0; width:100%; height:auto; display:block;">
    <img class="txt-overlay" id="txt1" src="map/map_1_text1.svg" alt="">
    <img class="txt-overlay" id="txt2" src="map/map_1_text2.svg" alt="">
    <img class="txt-overlay" id="txt3" src="map/map_1_text3.svg" alt="">
    <div id="map-topbar" style="position:absolute; top:0; left:0; width:100%; display:flex; align-items:center; justify-content:space-between; padding:30px 16px 12px; box-sizing:border-box;">
      <img src="map/hamb.svg" style="height:auto;" alt="">
      <img src="images/logo_first.svg" style="width:13%; height:auto; transform:translateX(-8px);" alt="">
      <img src="map/icon_map.svg" style="height:auto;" alt="">
    </div>

    <div id="map-wrap">
      <img class="map-img" src="map/map_images.png" alt="">

      <div class="region-hit" style="left:61%; top:55.7%;" onclick="goRegion('단양')"><img src="map/단양.png" alt="단양"></div>
      <div class="region-hit" style="left:68%; top:58.4%;" onclick="goRegion('지평')"><img src="map/지평.png" alt="지평"></div>
      <div class="region-hit" style="left:66%; top:69%;" onclick="goRegion('청송')"><img src="map/청송.png" alt="청송"></div>
      <div class="region-wrap" style="left:59%; top:67.3%;">
        <div class="event-popup" id="popup-문경">
          <img src="map/문경이벤트.svg" style="width:100%; display:block;">
          <div onclick="goDetail('오미자')" style="position:absolute; top:0; left:0; width:100%; height:50%; cursor:pointer; -webkit-tap-highlight-color:transparent;"></div>
          <div onclick="goDetail('구름')" style="position:absolute; top:50%; left:0; width:100%; height:50%; cursor:pointer; -webkit-tap-highlight-color:transparent;"></div>
        </div>
        <img class="region-btn" src="map/문경.png" alt="문경">
        <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:22%;height:100%;cursor:pointer;z-index:2;pointer-events:auto;-webkit-tap-highlight-color:transparent;" onclick="goRegion('문경')"></div>
      </div>
      <div class="region-hit" style="left:40.4%; top:71%;" onclick="goRegion('공주')"><img src="map/공주.png" alt="공주"></div>
      <div class="region-wrap" style="left:35%; top:86%;">
        <div class="event-popup" id="popup-해남">
          <img src="map/해남이벤트.svg" style="width:100%; display:block;">
          <div onclick="goDetail('해창')" style="position:absolute; top:0; left:0; width:100%; height:50%; cursor:pointer; -webkit-tap-highlight-color:transparent;"></div>
          <div onclick="goDetail('해남')" style="position:absolute; top:50%; left:0; width:100%; height:50%; cursor:pointer; -webkit-tap-highlight-color:transparent;"></div>
        </div>
        <img class="region-btn" src="map/해남.png" alt="해남">
        <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:55%;height:100%;cursor:pointer;z-index:2;pointer-events:auto;-webkit-tap-highlight-color:transparent;" onclick="goRegion('해남')"></div>
      </div>
      <div class="region-hit" style="left:43%; top:86%;" onclick="goRegion('고흥')"><img src="map/고흥.png" alt="고흥"></div>
    </div>
  </div>

</div>


<!-- 로고 → 메인 이동 -->
<a href="main_page.html" style="position:fixed; top:10px; left:50%; transform:translateX(-50%); width:100px; height:44px; z-index:200; -webkit-tap-highlight-color:transparent;"></a>

<!-- 햄버거 -->
<div id="hamburger" onclick="openTab()"></div>

<!-- 탭 오버레이 -->
<div id="tab-overlay">
  <div id="tab-bg" onclick="closeTab()"></div>
  <div id="tab-panel">
    <img class="tab-bg" src="main/tab_.png" alt="">
    <div style="position:absolute;top:21vh;left:51vw;display:flex;flex-direction:column;gap:3.8vh;">
      <a href="taste-test-share.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/막걸리 유형테스트.svg" style="height:2.4vh;width:auto;display:block;"></a>
      <a href="map_page.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/막걸리 계보도.svg" style="height:2.4vh;width:auto;display:block;"></a>
      <a href="event/event_page1.html" style="-webkit-tap-highlight-color:transparent;"><img src="main/이벤트.svg" style="height:2.4vh;width:auto;display:block;"></a>
    </div>
    <img src="main/button.svg" onclick="closeTab()" style="position:absolute;top:17vh;left:50vw;width:3vw;min-width:20px;height:auto;cursor:pointer;-webkit-tap-highlight-color:transparent;">
  </div>
</div>

<script src="map_page.js"></script>
</body>
</html>
